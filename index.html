<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzhidao CubeTimer | 专业魔方计时器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        :root {
            --primary-blue: #3b82f6;
            --secondary-blue: #0ea5e9;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --dark-bg: #0f172a;
            --darker-bg: #0a0f1f;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --cube-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #0ea5e9);
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 头部样式 */
        header {
            background-color: rgba(10, 15, 31, 0.95);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            font-size: 32px;
            background: var(--cube-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: var(--cube-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-left: 5px;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }
        
        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 17px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 6px;
            position: relative;
        }
        
        nav a:hover, nav a.active {
            color: var(--primary-blue);
            background-color: rgba(59, 130, 246, 0.1);
        }
        
        /* 主计时器区域 */
        .timer-section {
            padding: 60px 0 40px;
            text-align: center;
        }
        
        .timer-container {
            max-width: 900px;
            margin: 0 auto 50px;
            background: linear-gradient(145deg, #1a2335, #151c2b);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .timer-container:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--cube-gradient);
        }
        
        .cube-type-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .cube-type {
            padding: 10px 20px;
            background-color: var(--card-bg);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            font-weight: 600;
        }
        
        .cube-type:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .cube-type.active {
            background: var(--cube-gradient);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .time-display {
            font-size: 7.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            margin: 30px 0;
            letter-spacing: 2px;
            background: var(--cube-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        
        .time-display.small {
            font-size: 4.5rem;
        }
        
        .time-display.tiny {
            font-size: 3.5rem;
        }
        
        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0 30px;
        }
        
        .timer-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            justify-content: center;
        }
        
        .timer-btn.start {
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: white;
        }
        
        .timer-btn.stop {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
            color: white;
        }
        
        .timer-btn.reset {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
        }
        
        .timer-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
        
        .scramble-section {
            margin-top: 40px;
            padding: 25px;
            background-color: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            border-left: 5px solid var(--accent-yellow);
        }
        
        .scramble-display {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 20px;
            line-height: 1.4;
            letter-spacing: 1px;
        }
        
        .scramble-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .scramble-btn {
            padding: 12px 25px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .scramble-btn:hover {
            background-color: #2563eb;
            transform: translateY(-3px);
        }
        
        /* 统计区域 */
        .stats-section {
            padding: 60px 0;
            background-color: var(--darker-bg);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .stats-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }
        
        .stats-card h3 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-value {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: var(--cube-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .stats-label {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .stat-item {
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        /* 记录区域 */
        .records-section {
            padding: 70px 0;
        }
        
        .section-title {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 60px;
            color: var(--text-color);
            position: relative;
        }
        
        .section-title:after {
            content: '';
            position: absolute;
            width: 120px;
            height: 5px;
            background: var(--cube-gradient);
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
        }
        
        .chart-container {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 50px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            height: 400px;
        }
        
        .records-table-container {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--text-color);
            padding: 18px 15px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid var(--border-color);
        }
        
        td {
            padding: 18px 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
        }
        
        tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }
        
        .time-cell {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .record-action {
            color: var(--primary-blue);
            cursor: pointer;
            margin-left: 10px;
            transition: color 0.3s;
        }
        
        .record-action:hover {
            color: var(--secondary-blue);
        }
        
        /* 个性化设置区域 */
        .personalization-section {
            padding: 70px 0;
            background-color: var(--darker-bg);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        
        .settings-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }
        
        .settings-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }
        
        .settings-group {
            margin-bottom: 30px;
        }
        
        .settings-group h4 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .setting-label {
            color: var(--text-color);
            font-size: 1.1rem;
        }
        
        .setting-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 34px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: var(--primary-blue);
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(30px);
        }
        
        select {
            padding: 10px 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            min-width: 150px;
        }
        
        /* 反馈区域 */
        .feedback-section {
            padding: 70px 0;
        }
        
        .feedback-container {
            display: flex;
            gap: 60px;
        }
        
        .feedback-info {
            flex: 1;
        }
        
        .feedback-info h3 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: var(--text-color);
        }
        
        .feedback-info p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.8;
        }
        
        .tally-form-container {
            flex: 1;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }
        
        .tally-form-container h3 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--text-color);
        }
        
        .tally-iframe {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 8px;
            background: transparent;
        }
        
        .form-notice {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 15px;
            line-height: 1.5;
        }
        
        /* 页脚 */
        footer {
            background-color: var(--darker-bg);
            padding: 60px 0 30px;
            border-top: 1px solid var(--border-color);
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 50px;
            margin-bottom: 50px;
        }
        
        .footer-column {
            flex: 1;
            min-width: 250px;
        }
        
        .footer-column h3 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--text-color);
        }
        
        .footer-column p, .footer-column a {
            color: var(--text-muted);
            margin-bottom: 15px;
            display: block;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .footer-column a:hover {
            color: var(--primary-blue);
        }
        
        .social-icons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .social-icons a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background-color: var(--card-bg);
            border-radius: 50%;
            font-size: 1.3rem;
            transition: all 0.3s;
        }
        
        .social-icons a:hover {
            background: var(--cube-gradient);
            transform: translateY(-5px);
        }
        
        .copyright {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .time-display {
                font-size: 6rem;
            }
            
            .feedback-container {
                flex-direction: column;
            }
        }
        
        @media (max-width: 992px) {
            .timer-controls {
                flex-wrap: wrap;
            }
            
            .timer-btn {
                min-width: 160px;
            }
            
            .time-display {
                font-size: 5rem;
            }
            
            .time-display.small {
                font-size: 3.5rem;
            }
            
            .settings-container {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 20px;
            }
            
            nav ul {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .time-display {
                font-size: 4rem;
            }
            
            .time-display.small {
                font-size: 3rem;
            }
            
            .time-display.tiny {
                font-size: 2.5rem;
            }
            
            .timer-btn {
                padding: 14px 25px;
                min-width: 140px;
                font-size: 1.1rem;
            }
            
            .scramble-display {
                font-size: 1.4rem;
            }
            
            .section-title {
                font-size: 2.2rem;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            .tally-form-container {
                padding: 25px 20px;
            }
